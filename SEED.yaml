goal: build a new nag site by duplicating the 3SIN reading-app structure and adapting it to Codex I Coptic/English sources
constraints:
  - keep the existing 3SIN style of three-pane reading UX as the baseline
  - do not implement unrelated features
  - use local source files only
  - keep plan.md and research.md as documentation only
  - respect the repo's Route B workflow
  - implementation should start from a frozen seed
  - start with a 1:1 mapping attempt where one subtitle maps to one page
acceptance_criteria:
  - project scaffold exists in nag
  - Codex I works are organized from 1. 나그 목차.txt
  - English source texts from CODEX 1 ENG are wired in
  - Coptic source from codex 1.odt is parsed or extracted into the app
  - pages can show aligned Coptic and English content for the first implementation slice
  - the UI loads and renders without breaking the main reader flow
verification:
  - run the repo's build, typecheck, and test equivalents once the implementation exists
  - manually verify the first mapped section and the chapter navigation data contract in the app logic
out_of_scope:
  - backend
  - auth
  - remote APIs
  - audio
  - public deployment
  - browser smoke checks
  - final perfect scholarly alignment of every section before the first implementation slice
